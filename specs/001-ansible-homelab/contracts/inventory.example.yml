all:
  children:
    k3s_cluster:
      children:
        k3s_first_master:
          hosts:
            master1:
              ansible_host: 192.168.1.10
        k3s_join_masters:
          hosts:
            master2:
              ansible_host: 192.168.1.11
            master3:
              ansible_host: 192.168.1.12
        k3s_workers:
          hosts:
            worker1:
              ansible_host: 192.168.1.20
            worker2:
              ansible_host: 192.168.1.21
  vars:
    ansible_user: root # Or another user with passwordless sudo
    # Dynamically extract the IP of the first master node
    k3s_master_ip: "{{ hostvars[groups['k3s_first_master'][0]]['ansible_host'] }}"
